<!DOCTYPE html>
<head>
    <meta name="description" content="Explore the portfolio of Ved Suthar, an AI enthusiast and game developer. Discover projects in machine learning, game development, software engineering, and more.">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://veds.me/">
    <meta property="og:title" content="Ved Suthar - Portfolio">
    <meta property="og:description" content="Explore the portfolio of Ved Suthar, an AI enthusiast and game developer. Discover projects in ML, Game Dev, and Software Engineering.">
    <meta property="og:image" content="images/resim.webp">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://veds.me/">
    <meta property="twitter:title" content="Ved Suthar - Portfolio">
    <meta property="twitter:description" content="Explore the portfolio of Ved Suthar, an AI enthusiast and game developer.">
    <meta property="twitter:image" content="images/resim.webp">

    <title>Ved Suthar - Portfolio</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style">
    <script src="anim"></script>
    <script type="module">
        import { initAllPages, scrollToPage } from './contentPage';
        window.scrollToPage = scrollToPage;

        document.addEventListener('DOMContentLoaded', () => {
            initAllPages();
            if (window.onLoadAnim) window.onLoadAnim();
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw');
            });
        }
    </script>
    </head>


    <body>
    <div id="content">
        <div class="header" style="display: flex; align-items: center;">
            <h1 id="title">Ved Suthar</h1>
            <a href="https://www.linkedin.com/in/vedsuthar" target="_blank" rel="noopener noreferrer"
                 style="margin-left: auto;" class="social-links">
                <img src="images/InBug-Black.webp" alt="LinkedIn Profile" width="50" height="46.369047619" class="social-icon">
            </a>
            <a href="https://github.com/GoVed" target="_blank" rel="noopener noreferrer"
                class="social-links">
                <img src="images/github-mark.webp" alt="Github Profile" width="50" height="50" class="social-icon">
            </a>
        </div>


        <div id="innerContent">
            <section id="profile-page" class="page-section"></section>
            <section id="projects-page" class="page-section"></section>
            <section id="skills-page" class="page-section"></section>
            <section id="contact-page" class="page-section"></section>
        </div>
    </div>
    <div id="sidebar" role="navigation" aria-label="Main Navigation">
        <span onclick="toggleSidebar()" onkeypress="if(event.key==='Enter') toggleSidebar()" class="clickable" role="button" aria-label="Toggle Sidebar" tabindex="0">☰</span>
        <br><br>
        <span class="sidebarItem clickable" id="profileItem1"
            onclick="scrollToPage('profile-page')" 
            onkeypress="if(event.key==='Enter') scrollToPage('profile-page')"
            onmouseenter="document.getElementById('content').classList.add('preview-peek')"
            onmouseleave="document.getElementById('content').classList.remove('preview-peek')"
            role="button" tabindex="0" aria-label="Profile">Profile</span>
        <span class="sidebarItem clickable" id="profileItem2"
            onclick="scrollToPage('projects-page')" 
            onkeypress="if(event.key==='Enter') scrollToPage('projects-page')"
            onmouseenter="document.getElementById('content').classList.add('preview-peek')"
            onmouseleave="document.getElementById('content').classList.remove('preview-peek')"
            role="button" tabindex="0" aria-label="Projects">Projects</span>
        <span class="sidebarItem clickable" id="profileItem3"
            onclick="scrollToPage('skills-page')" 
            onkeypress="if(event.key==='Enter') scrollToPage('skills-page')"
            onmouseenter="document.getElementById('content').classList.add('preview-peek')"
            onmouseleave="document.getElementById('content').classList.remove('preview-peek')"
            role="button" tabindex="0" aria-label="Skills">Skills</span>
        <span class="sidebarItem clickable" id="profileItem4"
            onclick="scrollToPage('contact-page')" 
            onkeypress="if(event.key==='Enter') scrollToPage('contact-page')"
            onmouseenter="document.getElementById('content').classList.add('preview-peek')"
            onmouseleave="document.getElementById('content').classList.remove('preview-peek')"
            role="button" tabindex="0" aria-label="Contact">Contact</span>
    </div>
</body>

</html>
